interface:
  display_name: "Journal Alert to Notion"
  short_description: "Ingest verified Gmail journal alert papers to Notion with anti-bot-aware extraction."
  default_prompt: "Use $journal-alert-to-notion to process a Gmail journal alert using the exact email subject and received timestamp (or use date-only mode if I only provide a date). If the message is forwarded, preserve the outer Gmail match but also inspect forwarded-original metadata (`messageKind`, `forwardedOriginalSubject`, `forwardedOriginalSender`, `forwardedOriginalDate`) before verification. Extract only safe candidate links (never unsubscribe/manage-alert URLs), use Gmail link provenance/scoring (`candidateKind`, `sourceContext`, `candidateScore`) to prefer likely article links over footer TOC/home links, inspect Gmail helper diagnostics (`ui_probe`, `list_hydration`, `attempts`) if Gmail shows zero rows or search behaves inconsistently, precheck canonical DOI duplicates against my target Notion database before expensive verification when possible, verify research articles/editorials on official publisher pages (including anti-bot protected pages), and inspect verifier trace fields (`authorsStructured`, `authorSourceKind`, `authorParseWarnings`, tracking telemetry) if citation or tracker resolution looks suspicious. Add only verified non-duplicate entries, and report added items, skipped items with reasons, duplicate hits, and any verification gaps."
